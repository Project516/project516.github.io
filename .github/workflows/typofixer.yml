name: spell check

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  fix-spelling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Check and Fix Spelling
        uses: crate-ci/typos@v1.45.1
        continue-on-error: true 
        with:
          write_changes: true

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_user_name: typobot
          commit_user_email: typobot@project516.dev
          commit_message: "fix typos"
          branch: ${{ github.head_ref }}
